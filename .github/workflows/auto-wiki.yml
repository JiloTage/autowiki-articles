name: Auto-Wiki Skill Runner

on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill to run"
        required: true
        type: choice
        options:
          - "/auto-wiki"
          - "/auto-wiki-expand"
          - "/auto-wiki-sync"
          - "/auto-wiki-react"
          - "/auto-wiki-portal"
          - "/auto-wiki-feedback"
          - "/auto-wiki-request"
      args:
        description: "Arguments (e.g. topic name, --wiki id)"
        required: false
        type: string
        default: ""
      max_turns:
        description: "Max turns"
        required: false
        type: number
        default: 50

jobs:
  run-skill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run the following Auto-Wiki skill:
            ${{ inputs.skill }} ${{ inputs.args }}

            IMPORTANT: This is running in a non-interactive CI environment.
            - Do NOT ask for user confirmation at any step. Automatically continue all phases.
            - For /auto-wiki: proceed through all phases without pausing for confirmation.
            - For /auto-wiki-expand: run one expansion cycle and finish without asking to continue.
            - For /auto-wiki-react: automatically process all affinity pairs with score >= 0.7 without asking for selection.

            After completion, create a new branch named "auto-wiki/${{ github.run_id }}", commit all changes, push, and create a pull request to main.
          claude_args: "--max-turns ${{ inputs.max_turns }}"
          timeout_minutes: 60
